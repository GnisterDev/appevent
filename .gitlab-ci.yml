stages:
  - setup
  - quality
  - build

variables:
  NODE_VERSION: "22"
  NPM_REGISTRY: "https://registry.npmjs.org"

# Cache dependencies across jobs
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .next/cache/

# Setup Stage - Install dependencies
install_dependencies:
  stage: setup
  image: node:${NODE_VERSION}
  script:
    - echo "Installing dependencies..."
    - npm ci
  artifacts:
    paths:
      - node_modules/

# Quality Stage - Code formatting check
prettier:
  stage: quality
  image: node:${NODE_VERSION}
  needs:
    - install_dependencies
  script:
    - echo "Checking code formatting with Prettier..."
    - npx prettier --yes --check "src/**/*.{ts,tsx,js,jsx,json,css,scss,md}"

# Quality Stage - Linting
lint:
  stage: quality
  image: node:${NODE_VERSION}
  needs:
    - install_dependencies
  script:
    - echo "Linting code with ESLint..."
    - npx next lint

# Quality Stage - Type checking
type_check:
  stage: quality
  image: node:${NODE_VERSION}
  needs:
    - install_dependencies
  script:
    - echo "Running TypeScript type check..."
    - npx tsc --noEmit

# Quality Stage - Testing
unit_tests:
  stage: quality
  image: node:${NODE_VERSION}
  needs:
    - install_dependencies
  script:
    - echo "Running Jest tests..."
    - npm test
  coverage: /All files[^|]*\|[^|]*\s+([\d\.]+)/
  artifacts:
    reports:
      junit: junit.xml
    paths:
      - coverage/

# Build Stage - Build the Next.js application
build:
  stage: build
  image: node:${NODE_VERSION}
  needs:
    - lint
    - prettier
    - type_check
    - unit_tests
  script:
    - echo "Building Next.js application..."
    - npm run build
  artifacts:
    paths:
      - .next/
      - public/
      - package.json
      - next.config.js
