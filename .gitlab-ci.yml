stages:
  - setup
  - quality
  - build

variables:
  NODE_VERSION: "22"
  NPM_REGISTRY: "https://registry.npmjs.org"

# Cache dependencies across jobs
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .next/cache/

# Setup Stage - Install dependencies
install_dependencies:
  stage: setup
  image: node:${NODE_VERSION}
  script:
    - echo "Installing dependencies..."
    - npm ci

# Quality Stage - Linting
lint:
  stage: quality
  image: node:${NODE_VERSION}
  needs:
    - install_dependencies
  script:
    - echo "Linting code with ESLint..."
    - npx next lint

# Quality Stage - Testing
tests:
  stage: quality
  image: node:${NODE_VERSION}
  needs:
    - install_dependencies
  script:
    - echo "Running Jest tests..."
    - npx jest --config=jest.config.ts
  coverage: /All files[^|]*\|[^|]*\s+([\d\.]+)/

# prettier:
#   stage: quality
#   image: node:${NODE_VERSION}
#   needs:
#     - install_dependencies
#   script:
#     - echo "Running Prettier..."
#     - npx prettier --check .

# Build Stage - Build the Next.js application
build:
  stage: build
  image: node:${NODE_VERSION}
  needs:
    - lint
    - tests
  script:
    - echo "Building Next.js application..."
    - npm run build
